name: Sync Assignees When Moved to Assigned Column

# ─────────────────────────────────────────────────────────────────────────────
# When an issue is moved to one of the "Assigned: X" columns on the art request
# board, this workflow removes the other two default assignees — leaving only
# the person the issue was assigned to.
#
# Columns handled:
#   "Assigned: Daniel" → keep @dphawkins1617, remove @lottiecoxon @heidiberton
#   "Assigned: Lottie" → keep @lottiecoxon,  remove @dphawkins1617 @heidiberton
#   "Assigned: Heidi"  → keep @heidiberton,   remove @lottiecoxon @dphawkins1617
#   "Assigned: Cleo"   → no action taken
#
# Exception: if the issue was created by Lottie, Daniel, or Heidi themselves
# (i.e. it's an internal request between team members), all three stay assigned.
#
# REQUIRES: A repo secret named PROJECT_PAT.
# ─────────────────────────────────────────────────────────────────────────────

env:
    ORG: PostHog
    REPO: posthog.com
    PROJECT_NUMBER: 65

on:
    projects_v2_item:
        types: [edited]

jobs:
    sync-assignees:
        runs-on: ubuntu-latest
        # Only run when the Status field changed
        if: github.event.projects_v2_item.field_name == 'Status'

        steps:
            - name: Unassign inactive team members based on column
              uses: actions/github-script@v7
              with:
                  github-token: ${{ secrets.PROJECT_PAT }}
                  script: |
                      // ── Team member map ───────────────────────────────────────────────
                      // Maps each board column to:
                      //   owner    — the GitHub login to KEEP assigned
                      //   toRemove — the GitHub logins to REMOVE
                      const COLUMN_MAP = {
                        'Assigned: Daniel': {
                          owner:    'dphawkins1617',
                          toRemove: ['lottiecoxon', 'heidiberton'],
                        },
                        'Assigned: Lottie': {
                          owner:    'lottiecoxon',
                          toRemove: ['dphawkins1617', 'heidiberton'],
                        },
                        'Assigned: Heidi': {
                          owner:    'heidiberton',
                          toRemove: ['lottiecoxon', 'dphawkins1617'],
                        },
                      };

                      // Logins for all three default assignees — used to detect internal requests
                      const TEAM_LOGINS = ['lottiecoxon', 'dphawkins1617', 'heidiberton'];

                      const projectItemNodeId = context.payload.projects_v2_item.node_id;

                      // ── 1. Fetch the item's current Status and linked issue details ───
                      const query = `
                        query($nodeId: ID!) {
                          node(id: $nodeId) {
                            ... on ProjectV2Item {
                              fieldValues(first: 20) {
                                nodes {
                                  ... on ProjectV2ItemFieldSingleSelectValue {
                                    name
                                    field { ... on ProjectV2FieldCommon { name } }
                                  }
                                }
                              }
                              content {
                                ... on Issue {
                                  number
                                  state
                                  author { login }
                                  repository { nameWithOwner }
                                }
                              }
                            }
                          }
                        }
                      `;

                      const result = await github.graphql(query, { nodeId: projectItemNodeId });
                      const item = result.node;

                      // ── 2. Identify the new Status column ─────────────────────────────
                      const statusField = item.fieldValues.nodes.find(
                        f => f.field?.name === 'Status'
                      );

                      if (!statusField) {
                        console.log('No Status field found on this item — skipping.');
                        return;
                      }

                      const columnName = statusField.name;
                      const mapping = COLUMN_MAP[columnName];

                      if (!mapping) {
                        console.log(`Column "${columnName}" requires no assignee changes — skipping.`);
                        return;
                      }

                      // ── 3. Check if the issue is open and get its author ──────────────
                      const issue = item.content;

                      if (!issue?.number) {
                        console.log('No linked issue found — skipping.');
                        return;
                      }

                      if (issue.state === 'CLOSED') {
                        console.log(`Issue #${issue.number} is already closed — skipping.`);
                        return;
                      }

                      const author = issue.author?.login?.toLowerCase();

                      // ── 4. Exception: if created by a team member, leave all assigned ─
                      if (TEAM_LOGINS.map(l => l.toLowerCase()).includes(author)) {
                        console.log(
                          `Issue #${issue.number} was created by @${author} (team member) — leaving all assignees intact.`
                        );
                        return;
                      }

                      // ── 5. Remove the inactive assignees ─────────────────────────────
                      const [owner, repo] = issue.repository.nameWithOwner.split('/');

                      console.log(
                        `Issue #${issue.number} moved to "${columnName}". ` +
                        `Keeping @${mapping.owner}, removing @${mapping.toRemove.join(', @')}.`
                      );

                      await github.rest.issues.removeAssignees({
                        owner,
                        repo,
                        issue_number: issue.number,
                        assignees: mapping.toRemove,
                      });

                      console.log(`✅ Removed @${mapping.toRemove.join(', @')} from issue #${issue.number}`);
