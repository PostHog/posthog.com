name: Vale lint prose

on:
    pull_request:
        types:
            - opened
            - reopened
            - synchronize
    workflow_dispatch:
        inputs:
            pr_number:
                description: 'PR number to lint'
                required: true
                type: string

permissions:
    contents: read
    pull-requests: write

jobs:
    vale:
        name: Lint prose with Vale
        runs-on: ubuntu-latest

        steps:
            - name: Get PR info
              id: pr-info
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ inputs.pr_number }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  BASE_REF: ${{ github.base_ref }}
                  HEAD_REF: ${{ github.head_ref }}
                  HEAD_SHA: ${{ github.event.pull_request.head.sha }}
                  EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
              run: |
                  if [ -n "$PR_NUMBER" ]; then
                    PR_DATA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json baseRefName,headRefName,headRefOid)
                    echo "base_ref=$(echo "$PR_DATA" | jq -r '.baseRefName')" >> "$GITHUB_OUTPUT"
                    echo "head_ref=$(echo "$PR_DATA" | jq -r '.headRefName')" >> "$GITHUB_OUTPUT"
                    echo "head_sha=$(echo "$PR_DATA" | jq -r '.headRefOid')" >> "$GITHUB_OUTPUT"
                    echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
                  else
                    echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
                    echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
                    echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
                    echo "pr_number=$EVENT_PR_NUMBER" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
                  ref: ${{ steps.pr-info.outputs.head_sha }}

            - name: Install Vale
              env:
                  VALE_VERSION: '3.13.1'
              run: |
                  wget -q "https://github.com/errata-ai/vale/releases/download/v${VALE_VERSION}/vale_${VALE_VERSION}_Linux_64-bit.tar.gz"
                  tar -xzf "vale_${VALE_VERSION}_Linux_64-bit.tar.gz" -C /usr/local/bin vale
                  vale --version

            - name: Run Vale on changed files
              id: vale
              run: |
                  FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ steps.pr-info.outputs.base_ref }}...HEAD -- '*.md' '*.mdx')
                  if [ -z "$FILES" ]; then
                    echo "No markdown files changed, skipping Vale"
                    echo "has_findings=false" >> "$GITHUB_OUTPUT"
                    echo "### Vale: no markdown files changed" >> "$GITHUB_STEP_SUMMARY"
                    exit 0
                  fi
                  echo "Linting changed files:"
                  echo "$FILES"
                  echo "$FILES" | xargs vale --output=JSON > vale-output.json 2>/dev/null || true

                  TOTAL=$(jq '[.[][]] | length' vale-output.json)
                  if [ "$TOTAL" -eq 0 ]; then
                    echo "No findings"
                    echo "has_findings=false" >> "$GITHUB_OUTPUT"
                    echo "### Vale: all clear" >> "$GITHUB_STEP_SUMMARY"
                    exit 0
                  fi

                  echo "has_findings=true" >> "$GITHUB_OUTPUT"
                  echo "Found $TOTAL findings"

            - name: Generate reports
              if: steps.vale.outputs.has_findings == 'true'
              env:
                  PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
                  GITHUB_REPOSITORY: ${{ github.repository }}
                  BASE_REF: ${{ steps.pr-info.outputs.base_ref }}
              run: |
                  JOB_SUMMARY_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

                  ERRORS=$(jq '[.[][] | select(.Severity == "error")] | length' vale-output.json)
                  WARNINGS=$(jq '[.[][] | select(.Severity == "warning")] | length' vale-output.json)
                  SUGGESTIONS=$(jq '[.[][] | select(.Severity == "suggestion")] | length' vale-output.json)

                  # --- PR comment: summary table ---
                  {
                    echo "### Vale lint — ${ERRORS} errors, ${WARNINGS} warnings, ${SUGGESTIONS} suggestions"
                    echo ""
                    echo "[Full report →](${JOB_SUMMARY_URL})  ·  Copy the Job Summary code block into an LLM to batch-fix issues."
                    echo ""
                    echo "| File | Errors | Warnings | Suggestions |"
                    echo "|------|--------|----------|-------------|"
                    jq -r '
                      to_entries | sort_by(.key)[] |
                      .key as $file | .value as $findings |
                      ($findings | map(select(.Severity == "error")) | length) as $e |
                      ($findings | map(select(.Severity == "warning")) | length) as $w |
                      ($findings | map(select(.Severity == "suggestion")) | length) as $s |
                      "| `\($file)` | \($e) | \($w) | \($s) |"
                    ' vale-output.json
                  } > vale-comment.md

                  # --- Size guardrail: rebuild condensed if comment too large ---
                  COMMENT_SIZE=$(wc -c < vale-comment.md)
                  if [ "$COMMENT_SIZE" -gt 60000 ]; then
                    {
                      echo "### Vale lint — ${ERRORS} errors, ${WARNINGS} warnings, ${SUGGESTIONS} suggestions"
                      echo ""
                      echo "[Full report →](${JOB_SUMMARY_URL})  ·  Copy the Job Summary code block into an LLM to batch-fix issues."
                      echo ""
                      echo "> **Note:** Too many findings to show inline. See the Job Summary linked above."
                      echo ""
                      echo "| File | Findings |"
                      echo "|------|----------|"
                      jq -r 'to_entries | sort_by(.key)[] | "| `\(.key)` | \(.value | length) |"' vale-output.json
                    } > vale-comment.md
                  fi

                  # --- Review comments: per-file findings tables ---
                  echo '[]' > vale-review-comments.json
                  jq -r 'keys[]' vale-output.json | sort | while IFS= read -r FILE; do
                    # Find first changed line in diff for this file
                    FIRST_LINE=$(git diff "origin/${BASE_REF}...HEAD" -- "$FILE" \
                      | grep -m1 '^@@.*+' \
                      | sed 's/.*+\([0-9]*\).*/\1/')

                    if [ -z "$FIRST_LINE" ] || ! [ "$FIRST_LINE" -gt 0 ] 2>/dev/null; then
                      FIRST_LINE=1
                    fi

                    COUNT=$(jq --arg f "$FILE" '.[$f] | length' vale-output.json)

                    # Build the per-file findings table
                    BODY=$(
                      {
                        echo "### ${COUNT} findings"
                        echo ""
                        echo "| Line | Severity | Rule | Message |"
                        echo "|------|----------|------|---------|"
                        jq -r --arg f "$FILE" '
                          .[$f][] |
                          .Message as $msg |
                          ($msg | gsub("\\|"; "\\\\|") | gsub("\n"; " ")) as $safe_msg |
                          "| \(.Line) | \(.Severity) | `\(.Check)` | \($safe_msg) |"
                        ' vale-output.json
                      }
                    )

                    # Append to review comments JSON
                    jq --arg path "$FILE" \
                       --arg line "$FIRST_LINE" \
                       --arg body "$BODY" \
                       '. + [{"path": $path, "line": ($line | tonumber), "side": "RIGHT", "body": $body}]' \
                       vale-review-comments.json > vale-review-comments-tmp.json
                    mv vale-review-comments-tmp.json vale-review-comments.json
                  done

                  # --- Job Summary: LLM-ready plain-text ---
                  {
                    echo "### Vale lint results"
                    echo ""
                    echo "| Severity | Count |"
                    echo "|----------|-------|"
                    echo "| Error | ${ERRORS} |"
                    echo "| Warning | ${WARNINGS} |"
                    echo "| Suggestion | ${SUGGESTIONS} |"
                    echo ""
                    echo '```'
                    jq -r '
                      to_entries | sort_by(.key)[] | .key as $file | .value[] |
                      "\($file):\(.Line):\(.Span[0])  \(.Severity)  \(.Check)  \(.Message)"
                    ' vale-output.json
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Post or update PR comment
              if: ${{ !cancelled() }}
              uses: actions/github-script@v7
              env:
                  PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
                  HAS_FINDINGS: ${{ steps.vale.outputs.has_findings }}
              with:
                  script: |
                      const fs = require('fs');
                      const marker = '<!-- vale-lint -->';
                      const prNumber = parseInt(process.env.PR_NUMBER);

                      if (!prNumber) {
                        console.log('No PR number available, skipping comment');
                        return;
                      }

                      const { data: comments } = await github.rest.issues.listComments({
                        ...context.repo,
                        issue_number: prNumber,
                      });

                      const existing = comments.find(c =>
                        c.user?.login === 'github-actions[bot]' &&
                        c.body?.startsWith(marker)
                      );

                      if (process.env.HAS_FINDINGS !== 'true') {
                        if (existing) {
                          await github.rest.issues.deleteComment({
                            ...context.repo,
                            comment_id: existing.id,
                          });
                          console.log('Deleted stale Vale comment — no findings remain');
                        } else {
                          console.log('No findings and no existing comment — nothing to do');
                        }
                        return;
                      }

                      const body = fs.readFileSync('vale-comment.md', 'utf8');
                      const fullBody = `${marker}\n${body}`;

                      if (existing) {
                        await github.rest.issues.updateComment({
                          ...context.repo,
                          comment_id: existing.id,
                          body: fullBody,
                        });
                        console.log('Updated existing Vale comment');
                      } else {
                        await github.rest.issues.createComment({
                          ...context.repo,
                          issue_number: prNumber,
                          body: fullBody,
                        });
                        console.log('Created new Vale comment');
                      }

            - name: Post review with per-file comments
              if: steps.vale.outputs.has_findings == 'true'
              uses: actions/github-script@v7
              env:
                  PR_NUMBER: ${{ steps.pr-info.outputs.pr_number }}
                  HEAD_SHA: ${{ steps.pr-info.outputs.head_sha }}
              with:
                  script: |
                      const fs = require('fs');
                      const prNumber = parseInt(process.env.PR_NUMBER);
                      const headSha = process.env.HEAD_SHA;

                      if (!prNumber) {
                        console.log('No PR number available, skipping review');
                        return;
                      }

                      const comments = JSON.parse(fs.readFileSync('vale-review-comments.json', 'utf8'));

                      if (comments.length === 0) {
                        console.log('No review comments to post');
                        return;
                      }

                      await github.rest.pulls.createReview({
                        ...context.repo,
                        pull_number: prNumber,
                        commit_id: headSha,
                        event: 'COMMENT',
                        body: 'Vale lint',
                        comments: comments,
                      });

                      console.log(`Posted review with ${comments.length} file comment(s)`);
