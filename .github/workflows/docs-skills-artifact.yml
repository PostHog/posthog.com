name: Build docs skills artifact

on:
    schedule:
        - cron: '0 6 * * *' # Daily at 6am UTC
    workflow_dispatch:

concurrency:
    group: docs-skills-artifact
    cancel-in-progress: true

env:
    NODE_OPTIONS: '--max_old_space_size=8192'

jobs:
    build-docs-artifact:
        name: Build & upload docs zip
        runs-on: ubuntu-latest
        timeout-minutes: 45
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

            - name: Set up pnpm
              uses: pnpm/action-setup@c5ba7f7862a0f64c1b1a05fbac13e0b8e86ba08c # v4

            - name: Set up Node.js
              uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
              with:
                  node-version: '22'
                  cache: 'pnpm'

            - name: Cache Gatsby
              uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
              with:
                  path: |
                      .cache
                      public
                  key: gatsby-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'gatsby-config.js') }}
                  restore-keys: |
                      gatsby-${{ runner.os }}-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build site
              run: pnpm build
              env:
                  GATSBY_MINIMAL: 'true'
                  GENERATE_DOCS_MD: 'true'
                  GATSBY_SQUEAK_API_HOST: ${{ secrets.GATSBY_SQUEAK_API_HOST }}
                  CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
                  CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}

            - name: Create docs zip
              run: |
                  cd public
                  find docs -name '*.md' | zip -@ -r ../posthog-docs-md.zip llms.txt

            - name: Upload artifact
              uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
              with:
                  name: posthog-docs-md
                  path: posthog-docs-md.zip
                  retention-days: 30
